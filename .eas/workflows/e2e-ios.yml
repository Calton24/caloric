# .eas/workflows/e2e-ios.yml
# EAS Workflow for iOS Simulator E2E testing with Maestro

name: E2E Tests (iOS Simulator)

on:
  push:
    branches: [main, develop, mvp-features]
  pull_request:
    branches: [main, develop]

jobs:
  build_ios_simulator:
    name: Build iOS Simulator App
    type: build
    params:
      platform: ios
      profile: preview
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

  run_maestro_tests:
    name: Run Maestro E2E Tests
    type: maestro
    needs: [build_ios_simulator]
    params:
      build_id: ${{ needs.build_ios_simulator.outputs.build_id }}
      flow_path: ./maestro/flows
      device_identifier: "iPhone 16 Plus"
      output_format: junit
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
