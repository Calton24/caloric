# .eas/workflows/e2e-ios.yml
# EAS Workflow for iOS Simulator E2E testing with Maestro

name: E2E Tests (iOS Simulator)

on:
  push:
    branches: [main, develop, mvp-features]
  pull_request:
    branches: [main, develop]

jobs:
  build_and_test:
    name: Build iOS Simulator and Run Tests
    steps:
      - type: build
        id: ios_simulator_build
        name: Build iOS Simulator App
        with:
          platform: ios
          profile: preview
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - type: maestro
        id: maestro_test
        name: Run Maestro E2E Tests
        with:
          build_id: ${{ steps.ios_simulator_build.id }}
          flow_path: ./maestro/flows
          device_identifier: "iPhone 16 Plus"
          output_format: junit
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
