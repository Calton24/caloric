name: Mobile Core CI

on:
  push:
    branches: [main, develop, mvp-features]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  e2e-tests-ios:
    name: E2E Tests (iOS)
    runs-on: macos-14 # Pinned runner - no Xcode version roulette

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Ruby (Bundler-managed)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Pick deterministic simulator destination (UDID)
        id: sim
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list devices available

          UDID="$(xcrun simctl list devices available | \
            grep -m 1 -E "iPhone 15 Pro" | \
            sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')"

          if [[ -z "${UDID}" ]]; then
            echo "❌ No available iPhone 15 Pro simulator found on runner"
            exit 1
          fi

          echo "udid=${UDID}" >> "${GITHUB_OUTPUT}"
          echo "✅ Using simulator UDID: ${UDID}"

      - name: Boot simulator
        shell: bash
        run: |
          set -euo pipefail
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Install Ruby gems (Bundler)
        working-directory: ios
        run: bundle install --deployment

      - name: Install CocoaPods (deterministic)
        working-directory: ios
        env:
          COCOAPODS_DISABLE_STATS: "true"
          RUBYOPT: "-rlogger"
        run: bundle exec pod install --deployment --clean-install

      - name: Build iOS app for Detox (deterministic)
        env:
          DETOX_DEVICE_UDID: ${{ steps.sim.outputs.udid }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run e2e:build

      - name: Run Detox E2E tests
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run e2e:test

      - name: Upload E2E test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-artifacts
          path: |
            e2e/artifacts/
            ios/build/Build/Products/Debug-iphonesimulator/

  check-unused-exports:
    name: Check for Unused Exports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install ts-prune
        run: npm install -g ts-prune

      - name: Check for unused exports
        run: |
          echo "Checking for unused exports..."
          npx ts-prune --error || echo "Found unused exports (non-blocking)"

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate full test suite
        run: npm run validate || echo "Validation check (non-blocking)"

  all-checks-passed:
    name: All Checks Passed ✅
    runs-on: ubuntu-latest
    needs:
      [
        lint-and-typecheck,
        unit-tests,
        e2e-tests-ios,
        check-unused-exports,
        build-validation,
      ]
    if: always()

    steps:
      - name: Check all job statuses
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests-ios.result }}" != "success" ] || \
             [ "${{ needs.check-unused-exports.result }}" != "success" ] || \
             [ "${{ needs.build-validation.result }}" != "success" ]; then
            echo "❌ One or more checks failed"
            exit 1
          else
            echo "✅ All checks passed successfully!"
          fi
