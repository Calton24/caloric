name: Mobile Core CI

on:
  push:
    branches: [main, develop, mvp-features]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  e2e-tests-ios:
    name: E2E Tests (iOS)
    runs-on: macos-latest # Latest macOS with newest Xcode

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod --version

      - name: Prebuild iOS directory
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_PUBLIC_APP_PROFILE: default
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Fix Podfile for CocoaPods specs
        run: |
          cd ios
          # Ensure CocoaPods CDN source is at the top (required for modern RN dependencies like fast_float)
          if ! grep -q "source 'https://cdn.cocoapods.org/'" Podfile; then
            echo "source 'https://cdn.cocoapods.org/'" | cat - Podfile > Podfile.tmp
            mv Podfile.tmp Podfile
          fi
          # Add explicit RCT-Folly pod declaration for Sentry compatibility
          if grep -q "use_expo_modules!" Podfile && ! grep -q "pod 'RCT-Folly'" Podfile; then
            awk '/use_expo_modules!/ {print; print "  pod '\''RCT-Folly'\'', :podspec => '\''../node_modules/react-native/third-party-podspecs/RCT-Folly.podspec'\''"; next} {print}' Podfile > Podfile.tmp
            mv Podfile.tmp Podfile
          fi
          echo "--- Podfile (first 30 lines) ---"
          head -30 Podfile

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod repo update
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Cache Detox build
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox
          key: ${{ runner.os }}-detox-build-${{ hashFiles('ios/**') }}
          restore-keys: |
            ${{ runner.os }}-detox-build-

      - name: Setup iOS Simulator
        run: |
          xcrun simctl list devices available
          xcrun simctl create "iPhone 15 Pro CI" "iPhone 15 Pro" || true
          xcrun simctl boot "iPhone 15 Pro CI" || true

      - name: Build iOS app for Detox
        run: npm run e2e:build
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Detox E2E tests
        run: npm run e2e:test
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload E2E test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-artifacts
          path: |
            e2e/artifacts/
            ios/build/Build/Products/Debug-iphonesimulator/

  check-unused-exports:
    name: Check for Unused Exports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install ts-prune
        run: npm install -g ts-prune

      - name: Check for unused exports
        run: |
          echo "Checking for unused exports..."
          npx ts-prune --error || echo "Found unused exports (non-blocking)"

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate full test suite
        run: npm run validate || echo "Validation check (non-blocking)"

  all-checks-passed:
    name: All Checks Passed ✅
    runs-on: ubuntu-latest
    needs:
      [
        lint-and-typecheck,
        unit-tests,
        e2e-tests-ios,
        check-unused-exports,
        build-validation,
      ]
    if: always()

    steps:
      - name: Check all job statuses
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests-ios.result }}" != "success" ] || \
             [ "${{ needs.check-unused-exports.result }}" != "success" ] || \
             [ "${{ needs.build-validation.result }}" != "success" ]; then
            echo "❌ One or more checks failed"
            exit 1
          else
            echo "✅ All checks passed successfully!"
          fi
